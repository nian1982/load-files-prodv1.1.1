volumes:
  upload_tmp:
  redis_data:

services:
  redis:
    image: redis:7-alpine
    container_name: load_files_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  api:
    image: ${IMAGE_NAME}:${IMAGE_VERSION}-${IMAGE_ENV}
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: load_files_api
    env_file: ./backend/.env
    environment:
      - ENVIRONMENT=production
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_started
    ports:
      - "8005:8005"
    restart: unless-stopped
    tmpfs:
      - /dev/shm:size=1g
    volumes:
      - upload_tmp:/dev/shm/load_files_uploads
    extra_hosts:
      - "host.docker.internal:host-gateway"

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: load_files_worker
    env_file: ./backend/.env
    environment:
      - ENVIRONMENT=production
      - REDIS_URL=redis://redis:6379/0
    command: celery -A load_files.celery_app worker -l info -c 2 --max-tasks-per-child 10
    depends_on:
      redis:
        condition: service_started
    restart: unless-stopped
    tmpfs:
      - /dev/shm:size=1g
    volumes:
      - upload_tmp:/dev/shm/load_files_uploads
    extra_hosts:
      - "host.docker.internal:host-gateway"
