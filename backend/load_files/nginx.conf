# =============================================================================
# Configuracion de Nginx para Load Files Service
# Copiar a: /etc/nginx/sites-available/load-files.conf
# Activar:  ln -s /etc/nginx/sites-available/load-files.conf /etc/nginx/sites-enabled/
# Probar:   nginx -t
# Recargar: systemctl reload nginx
# =============================================================================

upstream load_files_api {
    server 127.0.0.1:8001;
    keepalive 32;
}

server {
    listen 443 ssl http2;
    server_name tu-dominio.com;

    # ── SSL ──────────────────────────────────────────────────────────────
    ssl_certificate     /etc/ssl/certs/tu-certificado.pem;
    ssl_certificate_key /etc/ssl/private/tu-certificado.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # ── Logs ─────────────────────────────────────────────────────────────
    access_log /var/log/nginx/load-files-access.log;
    error_log  /var/log/nginx/load-files-error.log warn;

    # ── Tamanio maximo de subida ─────────────────────────────────────────
    client_max_body_size 500M;
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;

    # ── WebSocket (progreso en tiempo real) ──────────────────────────────
    location /ws/ {
        proxy_pass http://load_files_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── API y frontend ───────────────────────────────────────────────────
    location / {
        proxy_pass http://load_files_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ── Redirigir HTTP a HTTPS ────────────────────────────────────────────────
server {
    listen 80;
    server_name tu-dominio.com;
    return 301 https://$host$request_uri;
}
