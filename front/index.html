<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cargar Archivos - SFTP</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1 id="app-title">Cargar Archivos</h1>
        <div id="auth-section">
            <span id="user-info" style="display:none"></span>
            <button id="logout-btn" style="display:none" onclick="logout()">Cerrar Sesion</button>
        </div>
    </header>

    <div id="login-view" class="view">
        <div class="card">
            <h2>Iniciar Sesion</h2>
            <form id="login-form" onsubmit="login(event)">
                <label for="username">Usuario</label>
                <input type="text" id="username" placeholder="Nombre de usuario" required>
                <label for="password">Contrasena</label>
                <input type="password" id="password" placeholder="Contrasena" required>
                <button type="submit" id="login-submit">Ingresar</button>
                <p id="login-error" class="error" style="display:none"></p>
            </form>
        </div>
    </div>

    <div id="forbidden-view" class="view" style="display:none">
        <div class="card" style="text-align:center; border-left:4px solid #d32f2f;">
            <div style="font-size:48px; margin-bottom:12px;">&#128274;</div>
            <h2 style="color:#d32f2f;">Sin Permisos</h2>
            <p id="forbidden-msg" style="color:#666; margin:16px 0;">
                No tienes el rol necesario para acceder a esta aplicacion.
            </p>
            <p style="font-size:.85rem; color:#999;">
                Contacta al administrador para solicitar el rol <strong>load_files.upload</strong>.
            </p>
        </div>
    </div>

    <div id="upload-view" class="view" style="display:none">
        <div class="card">
            <h2>Subir Archivo</h2>
            <form id="upload-form" onsubmit="uploadFile(event)">
                <label for="tipo_archivo">Tipo de Archivo</label>
                <select id="tipo_archivo" required>
                    <option value="">Seleccione...</option>
                    <option value="REPOSITORIO">REPOSITORIO</option>
                    <option value="FACTURAS">FACTURAS</option>
                    <option value="INFORMES">INFORMES</option>
                </select>
                <label for="fecha">Fecha</label>
                <input type="date" id="fecha" required>
                <label for="file">Archivo</label>
                <input type="file" id="file" required>
                <button type="submit" id="upload-btn">Subir Archivo</button>
            </form>
        </div>

        <div id="progress-card" class="card" style="display:none">
            <h2>Subiendo...</h2>
            <div id="progress-phase" style="font-size:.85rem;color:#666;margin-bottom:8px;"></div>
            <div class="progress-bar-container">
                <div id="progress-bar" class="progress-bar" style="width:0%"></div>
            </div>
            <div id="progress-details" style="display:flex;justify-content:space-between;font-size:.8rem;color:#888;margin-top:6px;">
                <span id="progress-percent">0%</span>
                <span id="progress-speed"></span>
                <span id="progress-eta"></span>
            </div>
            <div id="progress-log" style="margin-top:10px;font-size:.75rem;color:#999;max-height:60px;overflow-y:auto;font-family:monospace;"></div>
        </div>

        <div id="result-card" class="card result-card" style="display:none">
            <h2>Resultado</h2>
            <div id="result-content"></div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="app.js"></script>
</body>
</html>
