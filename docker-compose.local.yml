volumes:
  redis_data:
  upload_tmp:

services:
  redis:
    image: redis:7-alpine
    container_name: load_files_redis_local
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  api:
    image: ${IMAGE_NAME}:${IMAGE_VERSION}-${IMAGE_ENV}
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: load_files_api_local
    command: uvicorn load_files.api.main:app --host 0.0.0.0 --port 8005 --workers 5 --timeout-keep-alive 120
    ports:
      - "8005:8005"
    env_file: ./backend/.env
    environment:
      - REDIS_URL=redis://redis:6379/0
    tmpfs:
      - /dev/shm:size=1g
    volumes:
      - upload_tmp:/dev/shm/load_files_uploads
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_started
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: load_files_worker_local
    command: celery -A load_files.celery_app worker -l info -c 5 --max-tasks-per-child 10
    env_file: ./backend/.env
    environment:
      - REDIS_URL=redis://redis:6379/0
    tmpfs:
      - /dev/shm:size=1g
    volumes:
      - upload_tmp:/dev/shm/load_files_uploads
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_started
    restart: unless-stopped
